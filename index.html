<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>راه های ارتباطی</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Tahoma, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:90%;
    max-width:450px;
    background:#fff;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

h1{
    margin-bottom:25px;
    color:#333;
}

.btn{
    display:block;
    width:100%;
    padding:15px;
    margin:10px 0;
    text-decoration:none;
    color:#fff;
    border-radius:12px;
    font-size:17px;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.03);
}

.instagram{background:#E1306C;}
.telegram{background:#0088cc;}
.whatsapp{background:#25D366;}
.phone{background:#007bff;}
.map{background:#ff6b00;}
.neshan{background:#00a86b;}

.footer{
    margin-top:20px;
    color:#777;
    font-size:14px;
}
</style>

</head>
<body>

<div class="container">
