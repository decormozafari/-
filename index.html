<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>دکور مظفری</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
    margin:0;
    font-family:tahoma,sans-serif;
    background:#f5f5f5;
}

.container{
    max-width:450px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,.1);
    text-align:center;
}

.logo{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
}

h1{
    color:#333;
    margin-bottom:5px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:15px;
    border-radius:12px;
    margin:12px 0;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.instagram{
    background:#E1306C;
}

.telegram{
    background:#0088cc;
}

.whatsapp{
    background:#25D366;
}

.phone{
    background:#2563eb;
}

.map{
    background:#ef4444;
}

.neshan{
    background:#10b981;
}

.footer{
    margin-top:20px;
    color:#888;
    font-size:13px;
}

i{
    margin-left:8px;
}

</style>

</head>

<body>

<div class="container">

<!-- لوگو -->
<img src="logo.jpg" class="logo">

<h1>دکور مظفری</h1>

<div class="subtitle">
راه‌های ارتباطی
</div>

<a class="btn instagram"
href="https://instagram.com/mozafari.decor"
target="_blank">
<i class="fa-brands fa-instagram"></i>
اینستاگرام
</a>

<a class="btn telegram"
href="https://t.me/mozafaridecor"
target="_blank">
<i class="fa-brands fa-telegram"></i>
کانال تلگرام
</a>

<a class="btn telegram"
href="https://t.me/Mozafari_decor"
target="_blank">
<i class="fa-brands fa-telegram"></i>
پیام در تلگرام
</a>

<a class="btn whatsapp"
href="https://wa.me/989170496334"
target="_blank">
<i class="fa-brands fa-whatsapp"></i>
واتساپ
</a>

<a class="btn phone"
href="tel:+989170496334">
<i class="fa-solid fa-phone"></i>
تماس شماره اول
</a>

<a class="btn phone"
href="tel:+989175630921">
<i class="fa-solid fa-phone"></i>

</a>

<a class="btn map"
href="https://maps.app.goo.gl/Sa4cubMNkkA4rDrd8"
target="_blank">

<a class="btn neshan"

<div class="footer">
© Decor Mozafari
</div>

</div>
