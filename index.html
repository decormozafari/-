<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOZAFARI Interior Design</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#0f0f0f;
    font-family:Tahoma, sans-serif;
    padding:20px;
}

.container{
    max-width:500px;
    margin:auto;
    background:#171717;
    border:1px solid #d4af37;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(212,175,55,0.25);
}

.logo{
    width:250px;
    max-width:100%;
    height:auto;
    margin-bottom:20px;
}

.title{
    color:#d4af37;
    font-size:34px;
    font-weight:bold;
    margin-bottom:5px;
}

.subtitle{
    color:#b8922f;
    font-size:14px;
    letter-spacing:3px;
    margin-bottom:25px;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding:16px;
    margin:12px 0;
    border-radius:14px;
    text-decoration:none;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.instagram{
    background:#E1306C;
    color:white;
}

.telegram{
    background:#0088cc;
    color:white;
}

.whatsapp{
    background:#25D366;
    color:white;
}

.phone{
    background:#d4af37;
    color:#111;
}

.footer{
    margin-top:20px;
    color:#999;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<img src="logo.jpg" alt="MOZAFARI" class="logo">

<div class="title">MOZAFARI</div>

<div class="subtitle">
INTERIOR DESIGN
</div>

<a class="btn instagram"
href="https://instagram.com/mozafari.decor"
target="_blank">
<i class="fa-brands fa-instagram"></i>
اینستاگرام
</a>

<a class="btn telegram"
href="https://t.me/mozafaridecor"
target="_blank">
<i class="fa-brands fa-telegram"></i>
کانال تلگرام
</a>

<a class="btn telegram"
href="https://t.me/Mozafari_decor"
target="_blank">
<i class="fa-brands fa-telegram"></i>
پیام در تلگرام
</a>

<a class="btn whatsapp"
href="https://wa.me/989170496334"
target="_blank">
<i class="fa-brands fa-whatsapp"></i>
واتساپ
</a>

<a class="btn phone"
href="tel:09170496334">
<i class="fa-solid fa-phone"></i>
09170496334
</a>

<a class="btn phone"
href="tel:09175630921">
<i class="fa-solid fa-phone"></i>
09175630921
</a>

<div class="footer">
© MOZAFARI INTERIOR DESIGN
</div>

</div>

</body>
</html>
